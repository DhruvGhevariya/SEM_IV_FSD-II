<script>
    const emp =[
        {
            name: "mno",
            age: 25
        },
        {
            name: "ABC",
            age: 30
        },
        {
            name: "XYZ",
            age: 33
        }
    ] 
    const e=emp.sort(
        (a,b)=>b.age-a.age)
    for (i of e)
    {
        console.log(i.name+" "+i.age);
    }
    console.log(Math.max(...emp.map(e=>e.age)));
</script>

ABC 30 
mno 25 -->
